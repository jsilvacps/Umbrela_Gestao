# electron-builder.yml
# Configuração de empacotamento do Umbrela Gestão PDV para Windows .exe

appId: "com.umbrelagestao.pdv"
productName: "Umbrela Gestão PDV"
copyright: "© 2025 Umbrela Gestão"

# Diretório de saída dos instaladores (LOCAL — fora do Google Drive para evitar truncagem de arquivos)
directories:
  output: "C:\\umbrela-builds"
  buildResources: "electron"

# Arquivos incluídos no pacote Electron (o mínimo necessário)
files:
  - "electron/main.cjs"
  - "electron/preload.cjs"
  - "package.json"

# Recursos extras copiados para resources/ dentro do instalado
# O servidor Next.js standalone fica em resources/standalone/
extraResources:
  # server.js + package.json (raiz do standalone)
  - from: ".next/standalone"
    to: "standalone"
    filter:
      - "server.js"
      - "package.json"
  # node_modules do standalone (entrada separada — electron-builder exclui por padrão)
  - from: ".next/standalone/node_modules"
    to: "standalone/node_modules"
  # .next/ completo: server/ (páginas compiladas) + static/ (assets)
  - from: ".next/standalone/.next"
    to: "standalone/.next"
  # public/ (imagens, version.json, etc.)
  - from: ".next/standalone/public"
    to: "standalone/public"

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/icon.ico
  signtoolOptions:
    sign: null

nsis:
  oneClick: true                        # instalação silenciosa com 1 clique
  perMachine: false                     # instala por usuário (não precisa admin)
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Umbrela Gestão PDV"
  installerLanguages:
    - pt_BR
  language: "1046"                      # Português Brasil
  artifactName: "UmbrelaGestao-PDV-Setup-${version}.exe"

# ── Publicação (GitHub Releases) ─────────────────────────────────────────────
publish:
  provider: github
  owner: jsilvacps
  repo: Umbrela_Gestao
