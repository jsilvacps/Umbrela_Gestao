<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14803b"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Planta estilizada -->
  <g filter="url(#shadow)">
    <!-- Caule -->
    <path d="M128 195 L128 130" stroke="white" stroke-width="10" stroke-linecap="round" fill="none"/>

    <!-- Folha direita grande -->
    <path d="M131 148 Q170 138 168 100 Q130 112 131 148Z" fill="white" opacity="0.95"/>
    <!-- Folha esquerda grande -->
    <path d="M125 158 Q86 148 84 110 Q122 122 125 158Z" fill="white" opacity="0.9"/>
    <!-- Folha central topo -->
    <path d="M128 130 Q128 88 148 72 Q140 105 128 130Z" fill="white"/>
    <path d="M128 130 Q128 88 108 72 Q116 105 128 130Z" fill="white" opacity="0.85"/>
  </g>

  <!-- Haste do carrinho / base -->
  <rect x="88" y="193" width="80" height="10" rx="5" fill="white" opacity="0.9"/>

  <!-- Texto HORTI GESTÃO -->
  <text
    x="128" y="228"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="17"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    letter-spacing="2"
    opacity="0.95">HORTI GESTÃO</text>
</svg>
